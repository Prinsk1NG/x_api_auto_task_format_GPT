name: 昨晚硅谷在聊啥 v16 (日报主流程)

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: '🧪 开启测试模式'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: x-api-daily-report
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 1. 拉取最新代码 (包含 data 历史文件)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 安装 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir requests openai xai-sdk

      - name: 4. 显示当前模式
        shell: bash
        run: |
          TEST_MODE_VALUE="${{ github.event.inputs.test_mode == 'true' && 'true' || 'false' }}"
          echo "TEST_MODE_ENV=${TEST_MODE_VALUE}"
          if [ "${TEST_MODE_VALUE}" = "true" ]; then
            echo "当前为测试模式：脚本应只推送到 FEISHU_WEBHOOK_URL"
            echo "当前为测试模式：产物仅临时保留，不提交仓库"
          else
            echo "当前为正式模式：脚本应只推送到 FEISHU_WEBHOOK_URL_1"
            echo "当前为正式模式：产物会保存并提交到仓库"
          fi

      - name: 5. 运行日报主流程
        env:
          TEST_MODE_ENV: ${{ github.event.inputs.test_mode == 'true' && 'true' || 'false' }}

          FEISHU_WEBHOOK_URL_1: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          #FEISHU_WEBHOOK_URL_1: ${{ secrets.FEISHU_WEBHOOK_URL_1 }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECHAT_WEBHOOK_URL_1: ${{ secrets.WECHAT_WEBHOOK_URL_1 }}
          JIJYUN_WEBHOOK_URL: ${{ secrets.JIJYUN_WEBHOOK_URL }}
          ORISG_WEBHOOK_URL: ${{ secrets.ORISG_WEBHOOK_URL }}
          ORICN_WEBHOOK_URL: ${{ secrets.ORICN_WEBHOOK_URL }}

          TWITTERAPI_IO_KEY: ${{ secrets.TWITTERAPI_IO_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}

          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PPLX_API_KEY }}

          SF_API_KEY: ${{ secrets.SF_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: |
          python x_api_auto_task_xai_xml_final_clean.py

      - name: 6. 上传测试产物
        if: ${{ github.event.inputs.test_mode == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-test-artifacts-${{ github.run_number }}
          path: |
            test_outputs/**
            data/**/daily_report.txt
            data/**/combined.txt
            data/**/raw_llm_report.xml
            data/**/parsed_data.json
            data/memory_*.json
            data/character_memory.json
            data/target_accounts_stats.json
            data/echo_accounts_stats.json
          if-no-files-found: warn
          retention-days: 7

      - name: 7. 自动提交日报与数据文件
        if: ${{ github.event.inputs.test_mode != 'true' }}
        shell: bash
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/ || true
          git status --short
          git commit -m "🤖 [Daily Report v16] Update report artifacts" || echo "No changes to commit"
          git push
