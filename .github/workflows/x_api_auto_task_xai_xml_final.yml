name: 硅谷情报局自动任务 (V15.1)

on:
  #schedule:
  #  - cron: '0 23 * * *' # 每天北京时间早上 7 点运行（暂未启用）
  workflow_dispatch:
    inputs:
      test_mode:
        description: '🧪 开启测试模式 (仅发测试群)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install requests xai-sdk

      - name: 4. 执行核心情报捕获与研报生成
        env:
          twitterapi_io_KEY: ${{ secrets.TWITTERAPI_IO_KEY }}
          PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          SF_API_KEY: ${{ secrets.SF_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ github.event.inputs.test_mode == 'true' && secrets.FEISHU_WEBHOOK_URL || '' }}
          FEISHU_WEBHOOK_URL_1: ''
          FEISHU_WEBHOOK_URL_2: ''
          FEISHU_WEBHOOK_URL_3: ''
          JIJYUN_WEBHOOK_URL: ''
          OriSG_WEBHOOK_URL: ''
          OriCN_WEBHOOK_URL: ${{ secrets.OriCN_WEBHOOK_URL }}
          TEST_MODE_ENV: ${{ github.event.inputs.test_mode == 'true' && 'true' || 'false' }}
        run: python x_api_auto_task_xai_xml_final.py

      - name: 5. 自动保存原始快照与记忆账本
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add whales.txt experts.txt data/ || true

          git commit -m "🤖 [Daily Intelligence] Archive reports & Memory Bank" || echo "No changes to commit"
          git push
