name: 硅谷情报局半月度名单维护 v15 (1号/15号)

on:
  schedule:
    - cron: '0 2 1,15 * *'

  workflow_dispatch:
    inputs:
      test_mode:
        description: '🧪 开启测试模式'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  maintain-list:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 拉取最新代码 (包含 data 目录历史记录)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 安装 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 4. 显示当前模式
        run: |
          echo "TEST_MODE_ENV=${{ github.event.inputs.test_mode == 'true' && 'true' || 'false' }}"
          if [ "${{ github.event.inputs.test_mode == 'true' && 'true' || 'false' }}" = "true" ]; then
            echo "当前为测试模式，只允许推送到 FEISHU_WEBHOOK_URL"
          else
            echo "当前为正式模式，正式推送走 FEISHU_WEBHOOK_URL_1"
          fi

      - name: 5. 运行 HR Manager (半月度洗牌算法)
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_URL_1: ${{ secrets.FEISHU_WEBHOOK_URL_1 }}
          JIJYUN_WEBHOOK_URL: ${{ secrets.JIJYUN_WEBHOOK_URL }}
          TEST_MODE_ENV: ${{ github.event.inputs.test_mode == 'true' && 'true' || 'false' }}
        run: |
          python hr_manager.py

      - name: 6. 自动提交新名单
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add experts.txt whales.txt data || true
          git commit -m "🤖 [HR Manager v15] Portfolio Rebalancing: Automatically update lists" || echo "No changes to commit"
          git push
